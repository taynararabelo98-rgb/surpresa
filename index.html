<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale Presente Spa Day</title>

<style>
/* Regra global para garantir que os espaçamentos não quebrem o layout */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #e6c89c, #f3e4c8);
  font-family: Georgia, serif;
}

.card {
  width: 900px;
  max-width: 95%;
  height: 500px;
  background: #e8cba0;
  display: flex;
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  overflow: hidden;
  border-radius: 10px;
  position: relative; 
  user-select: none;
  -webkit-user-select: none;
}

.left {
  width: 45%;
  background: url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
  position: relative;
  border-right: 4px solid #d2b98d; 
}

.right {
  width: 55%;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.title {
  font-size: 26px;
  letter-spacing: 2px;
  color: #333;
}

.big {
  font-size: 55px;
  margin: 10px 0 20px;
  color: #2f3e2f;
}

.text {
  font-size: 19px;
  line-height: 1.5;
  color: #444;
}

.scratch-area {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  cursor: pointer;
  transition: opacity 1s ease-out;
  touch-action: none; 
}

.fade-out {
  opacity: 0;
  pointer-events: none;
}

/* Ajustes específicos para telas de celular (como o iPhone) */
@media (max-width: 768px) {
  .card { 
    flex-direction: column; 
    height: auto; 
  }
  .left { 
    width: 100%; 
    height: 200px; 
    border-right: none; 
    border-bottom: 4px solid #d2b98d; 
  }
  .right { 
    width: 100%; 
    padding: 30px 20px; /* Mais margem nas laterais */
    align-items: center; 
    text-align: center; 
  }
  .big { 
    font-size: 42px; /* Título um pouco menor para não apertar */
  }
  .text { 
    font-size: 17px; /* Texto levemente menor para caber perfeito */
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="left"></div>
  
  <div class="right">
    <div class="title">🎉 Surpresa!</div>
    <div class="big">SPA DAY</div>
    <div class="text">
      Samia, todo o seu time se reuniu para te proporcionar este dia de relaxamento.<br><br>
      Você é uma pessoa maravilhosa, uma excelente chefe e merece cada segundo desse descanso. Aproveite muito!
    </div>
  </div>

  <div class="scratch-area">
    <canvas id="scratch"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");

function initCanvas() {
  const card = document.querySelector('.card');
  canvas.width = card.offsetWidth;
  canvas.height = card.offsetHeight;

  const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  gradient.addColorStop(0, "#d4d4d4");
  gradient.addColorStop(0.25, "#f5f5f5");
  gradient.addColorStop(0.5, "#a6a6a6");
  gradient.addColorStop(0.75, "#e8e8e8");
  gradient.addColorStop(1, "#999999");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#444444";
  ctx.font = canvas.width < 500 ? "bold 20px Georgia" : "bold 32px Georgia";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("✨ Raspe aqui para ver o presente! ✨", canvas.width / 2, canvas.height / 2);

  ctx.globalCompositeOperation = "destination-out";
}

initCanvas();

let isDrawing = false;

function getCoordinates(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function startScratch(e) {
  isDrawing = true;
  scratch(e);
}

function stopScratch() {
  isDrawing = false;
  checkReveal();
}

function scratch(e) {
  if (!isDrawing) return;
  e.preventDefault(); 

  const pos = getCoordinates(e);

  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 70, 0, Math.PI * 2);
  ctx.fill();
}

canvas.addEventListener("pointerdown", startScratch);
canvas.addEventListener("pointermove", scratch);
canvas.addEventListener("pointerup", stopScratch);
canvas.addEventListener("pointercancel", stopScratch);
canvas.addEventListener("pointerleave", stopScratch);

// Reposiciona e redesenha a raspadinha se a pessoa virar a tela do celular
window.addEventListener("resize", () => {
  // Apenas redesenha se a raspadinha ainda não tiver sumido
  if (!canvas.classList.contains("fade-out")) {
    initCanvas();
  }
});

function checkReveal() {
  const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let transparent = 0;

  for (let i = 3; i < pixels.data.length; i += 4) {
    if (pixels.data[i] === 0) transparent++;
  }

  if (transparent > pixels.data.length * 0.40) {
    canvas.classList.add("fade-out");
  }
}
</script>

</body>
</html>
