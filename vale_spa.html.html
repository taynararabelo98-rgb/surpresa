<!DOCTYPE html>
<html lang="pt-pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale Presente Spa Day</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #e6c89c, #f3e4c8);
  font-family: Georgia, serif;
}

.card {
  width: 900px;
  max-width: 95%;
  height: 500px;
  background: #e8cba0;
  display: flex;
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  overflow: hidden;
  border-radius: 10px;
  position: relative;
}

.left {
  width: 45%;
  background: url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
  border-right: 4px solid #d2b98d;
}

.right {
  width: 55%;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.title {
  font-size: 26px;
  letter-spacing: 2px;
  color: #333;
}

.big {
  font-size: 55px;
  margin: 10px 0 20px;
  color: #2f3e2f;
}

.text {
  font-size: 20px;
  line-height: 1.5;
  color: #444;
}

.scratch-area {
  position: absolute;
  inset: 0;
}

canvas {
  position: absolute;
  inset: 0;
  touch-action: none;
  transition: opacity 1s;
}

.fade-out {
  opacity: 0;
  pointer-events: none;
}

@media (max-width: 768px) {
  .card { flex-direction: column; height: auto; }
  .left { width: 100%; height: 200px; border-right: none; border-bottom: 4px solid #d2b98d; }
  .right { width: 100%; padding: 30px; text-align: center; }
}
</style>
</head>

<body>

<div class="card">
  <div class="left"></div>

  <div class="right">
    <div class="title">🎉 Surpresa!</div>
    <div class="big">SPA DAY</div>
    <div class="text">
      Em nome de toda a equipa,<br>
      queremos presentear-te com<br>
      um <b>Spa Day</b> para que possas<br>
      relaxar e aproveitar muito!
    </div>
  </div>

  <div class="scratch-area">
    <canvas id="scratch"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");
let isDrawing = false;

function initCanvas() {
  const card = document.querySelector(".card");

  canvas.width = card.offsetWidth;
  canvas.height = card.offsetHeight;

  const gradient = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  gradient.addColorStop(0,"#d4d4d4");
  gradient.addColorStop(0.25,"#f5f5f5");
  gradient.addColorStop(0.5,"#a6a6a6");
  gradient.addColorStop(0.75,"#e8e8e8");
  gradient.addColorStop(1,"#999");

  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#444";
  ctx.font = canvas.width < 500 ? "bold 20px Georgia" : "bold 32px Georgia";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("✨ Raspe aqui para ver o presente! ✨", canvas.width/2, canvas.height/2);

  ctx.globalCompositeOperation = "destination-out";
}

window.onload = initCanvas;

function getXY(e){
  const rect = canvas.getBoundingClientRect();

  if(e.touches){
    return {
      x:e.touches[0].clientX-rect.left,
      y:e.touches[0].clientY-rect.top
    }
  }

  return {
    x:e.clientX-rect.left,
    y:e.clientY-rect.top
  }
}

function start(e){
  isDrawing=true;
}

function end(){
  isDrawing=false;
  checkReveal();
}

function scratch(e){
  if(!isDrawing) return;
  e.preventDefault();

  const pos=getXY(e);

  ctx.beginPath();
  ctx.arc(pos.x,pos.y,70,0,Math.PI*2);
  ctx.fill();
}

/* Desktop */
canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",scratch);
canvas.addEventListener("mouseup",end);

/* iPhone / touch */
canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",scratch);
canvas.addEventListener("touchend",end);

function checkReveal(){
  const pixels=ctx.getImageData(0,0,canvas.width,canvas.height);
  let transparent=0;

  for(let i=3;i<pixels.data.length;i+=4){
    if(pixels.data[i]===0) transparent++;
  }

  if(transparent>pixels.data.length*0.40){
    canvas.classList.add("fade-out");
  }
}
</script>

</body>
</html>
